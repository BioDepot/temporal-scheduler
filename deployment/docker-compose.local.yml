name: temporal-scheduler-local

services:
  postgresql:
    image: postgres:${POSTGRESQL_VERSION}
    container_name: temporal-scheduler-local-postgresql
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: temporal
    networks:
      - temporal-scheduler-local
    volumes:
      - temporal-postgresql-local-data:/var/lib/postgresql/data

  elasticsearch:
    image: elasticsearch:${ELASTICSEARCH_VERSION}
    container_name: temporal-scheduler-local-elasticsearch
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal-scheduler-local
    volumes:
      - temporal-elasticsearch-local-data:/usr/share/elasticsearch/data

  temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION}
    container_name: temporal-scheduler-local-temporal
    depends_on:
      - postgresql
      - elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=elasticsearch
      - ES_VERSION=v7
    networks:
      - temporal-scheduler-local
    ports:
      - "${TEMPORAL_GRPC_PORT:-7233}:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMIN_TOOLS_VERSION}
    container_name: temporal-scheduler-local-admin-tools
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - temporal-scheduler-local
    stdin_open: true
    tty: true

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    container_name: temporal-scheduler-local-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:${SCHEDULER_API_PORT:-8000}
    networks:
      - temporal-scheduler-local
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"

  bwb-scheduler-api:
    image: ${BWB_SCHEDULER_IMAGE:-bwb-scheduler:local}
    container_name: temporal-scheduler-local-api
    depends_on:
      - temporal
    environment:
      - MINIO_ENDPOINT_URL=${MINIO_ENDPOINT_URL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - SCHED_STORAGE_DIR=${SCHED_STORAGE_DIR}
      - TEMPORAL_ENDPOINT_URL=temporal:7233
    command: poetry run python3 -m uvicorn bwb.scheduling_service.main:app --host=0.0.0.0 --port=8000
    networks:
      - temporal-scheduler-local
    ports:
      - "${SCHEDULER_API_PORT:-8000}:8000"
    volumes:
      - ${SCHED_STORAGE_DIR}:${SCHED_STORAGE_DIR}

  bwb-sched-worker:
    image: ${BWB_SCHEDULER_IMAGE:-bwb-scheduler:local}
    container_name: temporal-scheduler-local-scheduler-worker
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      - MINIO_ENDPOINT_URL=${MINIO_ENDPOINT_URL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - SCHED_STORAGE_DIR=${SCHED_STORAGE_DIR}
      - TEMPORAL_ENDPOINT_URL=temporal:7233
      - BWB_SINGULARITY_EXTRA_BINDS=${BWB_SINGULARITY_EXTRA_BINDS:-}
    command: bash -c "sleep 15 && poetry run python bwb/scheduling_service/worker.py scheduler"
    networks:
      - temporal-scheduler-local
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SCHED_STORAGE_DIR}:${SCHED_STORAGE_DIR}

  bwb-regular-worker:
    image: ${BWB_SCHEDULER_IMAGE:-bwb-scheduler:local}
    container_name: temporal-scheduler-local-regular-worker
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      - MINIO_ENDPOINT_URL=${MINIO_ENDPOINT_URL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - SCHED_STORAGE_DIR=${SCHED_STORAGE_DIR}
      - TEMPORAL_ENDPOINT_URL=temporal:7233
      - BWB_SINGULARITY_EXTRA_BINDS=${BWB_SINGULARITY_EXTRA_BINDS:-}
    command: bash -c "sleep 15 && poetry run python bwb/scheduling_service/worker.py regular --queue ${LOCAL_WORKER_QUEUE:-worker1} --ram ${WORKER_RAM} --cpu_cores ${WORKER_CPUS} --gpus ${WORKER_GPUS}"
    networks:
      - temporal-scheduler-local
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SCHED_STORAGE_DIR}:${SCHED_STORAGE_DIR}

volumes:
  temporal-postgresql-local-data:
  temporal-elasticsearch-local-data:

networks:
  temporal-scheduler-local:
    driver: bridge
