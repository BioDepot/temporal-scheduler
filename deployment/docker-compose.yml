services:
    elasticsearch:
        container_name: temporal-elasticsearch
        environment:
            - cluster.routing.allocation.disk.threshold_enabled=true
            - cluster.routing.allocation.disk.watermark.low=512mb
            - cluster.routing.allocation.disk.watermark.high=256mb
            - cluster.routing.allocation.disk.watermark.flood_stage=128mb
            - discovery.type=single-node
            - ES_JAVA_OPTS=-Xms256m -Xmx256m
            - xpack.security.enabled=false
        image: elasticsearch:${ELASTICSEARCH_VERSION}
        networks:
            - temporal-network
        expose:
            - 9200
        volumes:
            - /var/lib/elasticsearch/data

    postgresql:
        container_name: temporal-postgresql
        environment:
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_DB: temporal
        image: postgres:${POSTGRESQL_VERSION}
        networks:
            - temporal-network
        ports:
            - 5432:5432

    minio:
        image: minio/minio:latest
        container_name: minio
        ports:
            - "9000:9000"  # MinIO API
            - "9001:9001"  # MinIO Console
        environment:
            MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
            MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
        command: server --console-address ":9001" /data
        volumes:
            - minio-data:/data
        networks:
            - temporal-network

    temporal:
        container_name: temporal
        depends_on:
            - postgresql
            - elasticsearch
        environment:
            - DB=postgres12
            - DB_PORT=5432
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PWD=${POSTGRES_PASSWORD}
            - POSTGRES_SEEDS=postgresql
            - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
            - ENABLE_ES=true
            - ES_SEEDS=elasticsearch
            - ES_VERSION=v7
        image: temporalio/auto-setup:${TEMPORAL_VERSION}
        networks:
            - temporal-network
        ports:
            - 7233:7233
        volumes:
            - ./dynamicconfig:/etc/temporal/config/dynamicconfig
        labels:
            kompose.volume.type: configMap

    temporal-admin-tools:
        container_name: temporal-admin-tools
        depends_on:
            - temporal
        environment:
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_CLI_ADDRESS=temporal:7233
        image: temporalio/admin-tools:${TEMPORAL_ADMIN_TOOLS_VERSION}
        networks:
            - temporal-network
        stdin_open: true
        tty: true

    temporal-ui:
        container_name: temporal-ui
        depends_on:
            - temporal
        environment:
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_CORS_ORIGINS=http://localhost:3000
        image: temporalio/ui:${TEMPORAL_UI_VERSION}
        networks:
            - temporal-network
        ports:
            - 8080:8080

    bwb-sched-worker:
        image: bwb-scheduler
        container_name: scheduler-worker
        restart: unless-stopped
        environment:
            - MINIO_ENDPOINT_URL=http://minio:9000
            - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
            - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
            - SCHED_STORAGE_DIR=/data/sched_storage
            - TEMPORAL_ENDPOINT_URL=temporal:7233
            - BWB_SINGULARITY_EXTRA_BINDS=${BWB_SINGULARITY_EXTRA_BINDS:-}
        depends_on:
            - temporal
        command: bash -c "sleep 10 && poetry run python bwb/scheduling_service/worker.py scheduler"
        networks:
            - temporal-network
        privileged: true
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - ${SCHED_STORAGE_DIR}:/data/sched_storage

    bwb-regular-worker:
        image: bwb-scheduler
        container_name: regular-worker1
        restart: unless-stopped
        environment:
            - MINIO_ENDPOINT_URL=http://minio:9000
            - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
            - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
            - SCHED_STORAGE_DIR=/data/sched_storage
            - TEMPORAL_ENDPOINT_URL=temporal:7233
            - BWB_SINGULARITY_EXTRA_BINDS=${BWB_SINGULARITY_EXTRA_BINDS:-}
        depends_on:
            - temporal
        command: bash -c "sleep 10 && poetry run python bwb/scheduling_service/worker.py regular --queue worker1 --ram ${WORKER_RAM} --cpu_cores ${WORKER_CPUS} --gpus ${WORKER_GPUS}"
        networks:
            - temporal-network
        privileged: true
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - ${SCHED_STORAGE_DIR}:/data/sched_storage

    bwb-scheduler-api:
        container_name: scheduler-server
        image: bwb-scheduler
        environment:
            - MINIO_ENDPOINT_URL=http://minio:9000
            - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
            - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
            - SCHED_STORAGE_DIR=/data/sched_storage
            - TEMPORAL_ENDPOINT_URL=temporal:7233
        depends_on:
            - temporal
        command: poetry run python3 -m uvicorn bwb.scheduling_service.main:app --host=0.0.0.0 --port=8000
        ports:
            - 8000:8000
        networks:
            - temporal-network

    # Go SLURM backend sidecar.  Exposes the six SLURM operations over a local
    # JSON HTTP API so the Python SLURM worker can delegate to Go without
    # Paramiko.  Port 8765 is published to the host so containers launched with
    # --network host (i.e. the local SLURM worker) can reach it at
    # http://localhost:8765.
    go-slurm-backend:
        image: go-slurm-backend
        container_name: go-slurm-backend
        restart: unless-stopped
        # Host networking is required so the Go sidecar can reach the SLURM
        # login node at localhost:3022 the same way the Python worker does.
        # With host networking, ports: is not used; the binary listens on
        # GO_SLURM_HOST_PORT directly on the host interface.
        network_mode: host
        command: ["-addr", ":${GO_SLURM_HOST_PORT:-8765}"]
        volumes:
            - ${HOME}/.ssh:/root/.ssh:ro
            - ${SCHED_STORAGE_DIR}:/data/sched_storage


volumes:
  minio-data:

networks:
    temporal-network:
        driver: bridge
        name: temporal-network
